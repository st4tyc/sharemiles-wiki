site_name: ShareMiles Wiki
site_description: Documentação de produto da plataforma ShareMiles
site_author: ShareMiles Team
docs_dir: docs
custom_dir: overrides

theme:
  name: material
  language: pt-BR
  custom_dir: overrides
  palette:
    - scheme: default
      primary: deep-purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: deep-purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pt

copyright: "&copy; 2025 ShareMiles. Todos os direitos reservados."

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://sharemiles.com.br
      name: sharemiles.com.br

nav:
  - Início: index.md
  - Visão de Produto:
    - Contexto da Plataforma: visao-produto/contexto-plataforma.md
    - Mapa de Módulos: visao-produto/mapa-modulos.md
    - Personas Detalhadas: visao-produto/personas-detalhadas.md
    - Glossário: visao-produto/glossario.md
  - Jornadas:
    - Jornada do Vendedor: visao-produto/jornada-vendedor.md
    - Jornada do Comprador: visao-produto/jornada-comprador.md
  - Gestão de Produto:
    - Backlog Macro: visao-produto/backlog-macro.md
    - Decisões de Produto: visao-produto/decisoes-produto.md
    - Gaps e Decisões Abertas: visao-produto/gaps-e-decisoes-abertas.md
    - Análise de Gaps: visao-produto/analise-gaps-documentacao.md
